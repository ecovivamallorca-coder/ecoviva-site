<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Your Project | EcoViva Mallorca</title>

  <style>
    :root {
      --bg: #07101b;
      --bg2: #0d1828;
      --panel: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: #cdd7e6;
      --muted-2: #9aa8bd;
      --green: #8fde65;
      --white-card: #ffffff;
      --shadow: 0 34px 90px rgba(0,0,0,0.26);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --max: 1240px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(143,222,101,0.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* HERO */
    .hero {
      padding: 80px 0;
    }

    .hero-card {
      border-radius: var(--radius-xl);
      padding: 60px;
      background:
        linear-gradient(90deg, rgba(7,16,27,0.9), rgba(7,16,27,0.4)),
        url("https://images.unsplash.com/photo-1613977257363-707ba9348227?auto=format&fit=crop&w=1800&q=80") center/cover;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .hero p {
      color: var(--muted);
      font-size: 18px;
      max-width: 600px;
    }

    /* FORM */
    .form-section {
      padding: 40px 0 80px;
    }

    .form-shell {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--white-card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .form-head {
      padding: 28px;
      background: #f5f7fb;
      color: #08111d;
    }

    .form-head h2 {
      margin: 0 0 10px;
    }

    .form-embed {
      padding: 0 20px 20px;
      background: white;
    }

    /* FIXED FILL OUT */
    .fillout-wrapper {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
    }

    .privacy {
      text-align: center;
      margin-top: 16px;
      color: var(--muted-2);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .hero-card { padding: 30px; }
      .hero h1 { font-size: 32px; }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <div class="hero-card">
        <h1>Start your project</h1>
        <p>
          Tell us about your request — we guide you to the right next step.
        </p>
      </div>
    </div>
  </section>

  <!-- FORM -->
  <section class="form-section">
    <div class="container">

      <div class="form-shell">

        <div class="form-head">
          <h2>Project intake form</h2>
          <p>Complete the form below and we will review your request.</p>
        </div>

        <div class="form-embed">
          
          <div
            class="fillout-wrapper"
            style="width:100%;"
            data-fillout-id="59qsbh9ckrus"
            data-fillout-embed-type="standard"
            data-fillout-inherit-parameters
            data-fillout-dynamic-resize>
          </div>

        </div>

      </div>

      <div class="privacy">
        Your information is treated confidentially.
      </div>

    </div>
  </section>

  <!-- SCRIPT (ONLY ONCE!) -->
  <script src="https://server.fillout.com/embed/v1/"></script>

</body>
</html>
